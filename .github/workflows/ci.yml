name: CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ./Tadpole.slnx

      - name: Build
        run: dotnet build --configuration Release --no-restore ./Tadpole.slnx

      - name: Run tests
        run: dotnet test --configuration Release --no-build --logger trx --results-directory ./TestResults ./Tadpole.slnx
